# Release: build, pack NuGet, and publish
name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  packages: write
  contents: write

jobs:
  quality-gate:
    name: Quality Gate (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore GodotMcp.sln
      - name: Verify formatting
        run: dotnet format GodotMcp.sln --verify-no-changes --no-restore
      - name: Build (analyzers)
        run: dotnet build GodotMcp.sln -c Release --no-restore -p:RunAnalyzers=true -p:EnableNETAnalyzers=true
      - name: Test
        run: dotnet test GodotMcp.sln --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage" --settings coverlet.runsettings

  pack:
    name: Pack NuGet
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GodotMcp.sln

      - name: Build
        run: dotnet build src/GodotMcp.Plugin/GodotMcp.Plugin.csproj -c Release --no-restore

      - name: Clean package output folder
        shell: bash
        run: rm -f nupkg/*.nupkg nupkg/*.snupkg

      - name: Pack
        run: dotnet pack src/GodotMcp.Plugin/GodotMcp.Plugin.csproj -c Release -o nupkg --no-build --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            nupkg/*.nupkg
            nupkg/*.snupkg

  publish-nuget:
    name: Publish to NuGet.org
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nupkg

      - name: Verify downloaded packages
        id: resolve-packages
        shell: bash
        run: |
          shopt -s nullglob
          nupkgs=( $(ls -1t nupkg/*.nupkg 2>/dev/null) )
          snupkgs=( $(ls -1t nupkg/*.snupkg 2>/dev/null) )
          if [ ${#nupkgs[@]} -eq 0 ]; then
            echo "No .nupkg files were downloaded from artifact 'nupkg'."
            exit 1
          fi
          if [ ${#snupkgs[@]} -eq 0 ]; then
            echo "No .snupkg files were downloaded from artifact 'nupkg'."
            exit 1
          fi
          if [ ${#nupkgs[@]} -gt 1 ]; then
            echo "Multiple .nupkg files found; selecting newest by modification time:"
            printf '%s\n' "${nupkgs[@]}"
          fi
          if [ ${#snupkgs[@]} -gt 1 ]; then
            echo "Multiple .snupkg files found; selecting newest by modification time:"
            printf '%s\n' "${snupkgs[@]}"
          fi
          echo "NUPKG_FILE=${nupkgs[0]}" >> "$GITHUB_ENV"
          echo "SNUPKG_FILE=${snupkgs[0]}" >> "$GITHUB_ENV"
          echo "Resolved package: ${nupkgs[0]}"
          echo "Resolved symbols: ${snupkgs[0]}"

      - name: Validate NuGet API key
        shell: bash
        run: |
          if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "NUGET_API_KEY secret is missing or empty."
            echo "Add it in your repo settings: Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Push to NuGet
        run: dotnet nuget push "${{ env.NUPKG_FILE }}" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

      - name: Push symbols to NuGet
        run: dotnet nuget push "${{ env.SNUPKG_FILE }}" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

  release-assets:
    name: Attach to GitHub Release
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nupkg

      - name: Verify downloaded packages
        id: resolve-packages
        shell: bash
        run: |
          shopt -s nullglob
          nupkgs=( $(ls -1t nupkg/*.nupkg 2>/dev/null) )
          snupkgs=( $(ls -1t nupkg/*.snupkg 2>/dev/null) )
          if [ ${#nupkgs[@]} -eq 0 ]; then
            echo "No .nupkg files were downloaded from artifact 'nupkg'."
            exit 1
          fi
          if [ ${#snupkgs[@]} -eq 0 ]; then
            echo "No .snupkg files were downloaded from artifact 'nupkg'."
            exit 1
          fi
          if [ ${#nupkgs[@]} -gt 1 ]; then
            echo "Multiple .nupkg files found; selecting newest by modification time:"
            printf '%s\n' "${nupkgs[@]}"
          fi
          if [ ${#snupkgs[@]} -gt 1 ]; then
            echo "Multiple .snupkg files found; selecting newest by modification time:"
            printf '%s\n' "${snupkgs[@]}"
          fi
          echo "NUPKG_FILE=${nupkgs[0]}" >> "$GITHUB_ENV"
          echo "SNUPKG_FILE=${snupkgs[0]}" >> "$GITHUB_ENV"
          echo "Resolved package: ${nupkgs[0]}"
          echo "Resolved symbols: ${snupkgs[0]}"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.NUPKG_FILE }}
            ${{ env.SNUPKG_FILE }}
          generate_release_notes: true
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
