name: Pack and Publish NuGet on Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  pack-and-publish:
    name: Pack and publish NuGet package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore GodotMcp.sln

      - name: Build plugin
        run: dotnet build src/GodotMcp.Plugin/GodotMcp.Plugin.csproj -c Release --no-restore

      - name: Pack plugin (.nupkg)
        run: |
          mkdir -p nupkg
          dotnet pack src/GodotMcp.Plugin/GodotMcp.Plugin.csproj -c Release -o nupkg --no-build

      - name: Validate NuGet API key
        run: |
          if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "Missing NUGET_API_KEY secret. Set it in repository secrets to enable pushing to nuget.org." >&2
            exit 1
          fi

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "nupkg/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload .nupkg to GitHub Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: nupkg/*.nupkg
          asset_name: GodotMcp.SemanticKernel.Plugin-${{ github.event.release.tag_name }}.nupkg
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
