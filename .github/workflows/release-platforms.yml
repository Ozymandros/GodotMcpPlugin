name: Release Platforms

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            rid: linux-x64
          - os: ubuntu-22.04
            rid: linux-arm64
          - os: windows-2022
            rid: win-x64
          - os: windows-2022
            rid: win-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single-file
        run: |
          echo "Publishing for ${{ matrix.rid }}"
          dotnet publish src/GodotMcp.Server/GodotMcp.Server.csproj -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true -p:SelfContained=true -o ./out/${{ matrix.rid }}

      - name: Package artifact (non-Windows)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          RID=${{ matrix.rid }}
          cd out/${RID}
          zip -r "${{ github.workspace }}/dist/godot-mcp-${RID}.zip" .
        shell: bash

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          $RID = "${{ matrix.rid }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "out\$RID\*" -DestinationPath "${{ github.workspace }}\dist\godot-mcp-$RID.zip" -Force
        shell: pwsh

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ github.workspace }}/dist/godot-mcp-${{ matrix.rid }}.zip
          asset_name: godot-mcp-${{ matrix.rid }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
