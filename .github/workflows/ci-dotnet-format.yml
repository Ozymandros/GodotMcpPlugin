name: Format and Build

on:
  pull_request:
  push:
    branches: [ main, develop ]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: dotnet format
        run: |
          dotnet tool restore || true
          dotnet format --verify-no-changes || true
